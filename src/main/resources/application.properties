spring.application.name=fee-service
server.port=8082
spring.datasource.url=jdbc:h2:mem:fees
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=alpha
springdoc.swagger-ui.tagsSorter=alpha

student.service.url=http://localhost:8081/students

# Circuit Breaker Configuration
resilience4j.circuitbreaker.instances.studentService.registerHealthIndicator=true
resilience4j.circuitbreaker.instances.studentService.slidingWindowType=COUNT_BASED
resilience4j.circuitbreaker.instances.studentService.slidingWindowSize=5
resilience4j.circuitbreaker.instances.studentService.minimumNumberOfCalls=3
resilience4j.circuitbreaker.instances.studentService.failureRateThreshold=50
resilience4j.circuitbreaker.instances.studentService.waitDurationInOpenState=10s
resilience4j.circuitbreaker.instances.studentService.permittedNumberOfCallsInHalfOpenState=2
resilience4j.circuitbreaker.instances.studentService.automaticTransitionFromOpenToHalfOpenEnabled=true

# Timeout configuration
resilience4j.timelimiter.instances.studentService.timeoutDuration=3s

management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always